<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusPulse | Events</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">CP</div>
      <div class="logo-text">CampusPulse</div>
    </div>

    <a id="dashboardLink" href="dashboard.html">Dashboard</a>
    <a id="eventsLink" href="events.html" class="active">Events</a>
    <a id="noticesLink" href="notices.html">Notices</a>
    <a id="registrationsLink" href="my-registrations.html">My Registrations</a>
    <a id="certificatesLink" href="certificates.html">Certificates</a>
    <a id="manageEventsLink" href="manage-events.html">Manage Events</a>
    <a id="createEventLink" href="create-event.html">Create Event</a>
    <a id="adminDashboardLink" href="admin-dashboard.html">Admin Dashboard</a>
    <a id="attendanceLink" href="attendance.html">Attendance</a>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <main class="main">

    <header class="topbar">
      <div class="profile">
  <span id="welcomeUser">Welcome</span>
</div>
    </header>

    <section class="welcome">
      <div>
        <h1>Explore Events</h1>
        <p>Find hackathons, workshops, competitions, seminars and more.</p>
      </div>
    </section>

    <section class="filter-tabs">
      <button onclick="filterEvents('All')">All</button>
      <button onclick="filterEvents('Hackathon')">Hackathon</button>
      <button onclick="filterEvents('Workshop')">Workshop</button>
      <button onclick="filterEvents('Cultural')">Cultural</button>
      <button onclick="filterEvents('Sports')">Sports</button>
      <button onclick="filterEvents('Technical')">Technical</button>
    </section>

    <section class="filter-tabs">
      <input
        type="text"
        id="searchInput"
        placeholder="Search events..."
      />

      <select id="departmentFilter">
        <option value="All">All Departments</option>
        <option value="CSE">CSE</option>
        <option value="IT">IT</option>
        <option value="AIML">AIML</option>
        <option value="AIDS">AIDS</option>
        <option value="ENTC">ENTC</option>
        <option value="Mechanical">Mechanical</option>
        <option value="Civil">Civil</option>
        <option value="Electrical">Electrical</option>
      </select>
    </section>

    <section class="events-grid" id="eventsContainer">
      <!-- Events will load dynamically from MongoDB -->
    </section>

  </main>

</div>

<script src="../js/script.js"></script>
</body>
</html>
