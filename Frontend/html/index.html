<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusPulse | Login</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">

      <h1>🎓 CampusPulse</h1>
      <p>Manage. Participate. Grow.</p>

      <form id="loginForm">
       <input
  type="email"
  name="email"
  autocomplete="email"
  required
  placeholder="Email"
>

<input
  type="password"
  name="password"
  autocomplete="current-password"
  required
  placeholder="Password"
>

        <button type="submit">Login</button>
      </form>

      <p class="switch-text">
        Don’t have an account?
        <a href="signup.html">Sign up</a>
      </p>

    </div>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
